<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加用户 - PicUp图床</title>
    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式 */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #fff;
            overflow-x: hidden;
            background-color: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 添加用户卡片 */
        .add-user-card {
            backdrop-filter: blur(10px);
            background: rgba(26, 31, 58, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }
        
        /* 标题样式 */
        .text-center {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .text-center p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }
        
        /* 错误提示 */
        .bg-red-100 {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        
        /* 表单样式 */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .mb-4, .mb-6 {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
        }
        
        /* 输入框和选择框容器 */
        .relative {
            position: relative;
        }
        
        /* 添加用户页面的图标容器样式 */
        .add-user-icon-container {
            position: absolute;
            left: 1.5rem;
            top: -30px;
            bottom: 0;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* 输入框样式 */
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            background: rgba(10, 14, 39, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }
        
        /* 选择框样式 */
        select {
            cursor: pointer;
        }
        
        /* 选项样式 */
        option {
            background-color: #1a1f3a;
            color: #fff;
        }
        
        /* 按钮容器 */
        .flex {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        /* 右边距 */
        .mr-2 {
            margin-right: 0.5rem;
        }
        
        /* 主要按钮 */
        button.bg-purple-600, a.bg-gray-600 {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }
        
        button.bg-purple-600 {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        button.bg-purple-600:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        
        /* 次要按钮 */
        a.bg-gray-600 {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        a.bg-gray-600:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        /* 响应式设计 */
        @media (max-width: 640px) {
            .add-user-card {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            /* 表单输入框和选择框调整 */
            input[type="text"], input[type="password"], select {
                padding: 0.875rem 1rem 0.875rem 3rem;
                font-size: 0.9rem;
            }
            
            /* 图标位置调整 */
            .add-user-icon-container {
                left: 0.9rem;
                top: -20px;
            }
            
            /* 标签字体大小调整 */
            label {
                font-size: 0.9rem;
            }
            
            /* 按钮容器样式调整 */
            .flex {
                flex-direction: column;
                gap: 1rem;
            }
            
            /* 按钮内边距调整 */
            button.bg-purple-600, a.bg-gray-600 {
                padding: 0.875rem 2rem;
                font-size: 0.95rem;
            }
        }
        
        @media (max-width: 480px) {
            /* 进一步调整内边距 */
            .add-user-card {
                padding: 1.25rem;
            }
            
            /* 图标位置调整 */
            .add-user-icon-container {
                left: 0.75rem;
                top: -20px;
            }
            
            /* 输入框内边距调整 */
            input[type="text"], input[type="password"], select {
                padding: 0.75rem 0.75rem 0.75rem 2.75rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="add-user-card">
            <div class="text-center">
                <h1>添加新用户</h1>
                <p>创建新的用户账户</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="mb-4">
                        {% for message in messages %}
                            <div class="bg-red-100">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-4">
                    <label for="username" class="block">用户名</label>
                    <div class="relative">
                        <div class="add-user-icon-container absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="block">密码</label>
                    <div class="relative">
                        <div class="add-user-icon-container absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label for="role" class="block">用户角色</label>
                    <div class="relative">
                        <div class="add-user-icon-container absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <select id="role" name="role" required>
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex">
                    <button type="submit" class="bg-purple-600">
                        <i class="fas fa-save mr-2"></i>保存用户
                    </button>
                    <a href="{{ url_for('admin_users') }}" class="bg-gray-600">
                        <i class="fas fa-arrow-left mr-2"></i>返回列表
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
